databases:
  - name: koala-habit-preview-db
    databaseName: koala_habit_preview
    user: koala_habit_preview
    plan: free

services:
  - type: web
    name: koala-habit-api-preview
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build -w server
    startCommand: npm run start -w server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: preview
      - key: DATABASE_URL
        fromDatabase:
          name: koala-habit-preview-db
          property: connectionString
      - key: BLOB_READ_WRITE_TOKEN
        sync: false
